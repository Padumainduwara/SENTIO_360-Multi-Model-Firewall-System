<!DOCTYPE html>
<html lang="en">
<head>
    <title>SENTIO 360 - Global WAF Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; overflow-x: hidden; }
        .glass { background: rgba(20, 20, 20, 0.9); border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .log-row { border-bottom: 1px solid #222; padding: 12px 15px; display: grid; grid-template-columns: 0.8fr 1fr 1fr 1.2fr 3fr 0.8fr 0.8fr 0.8fr; gap: 8px; font-size: 11px; align-items: center;}
        .block-text { color: #ff4444; font-weight: bold; }
        .allow-text { color: #00C851; font-weight: bold; }
        .badge-warning { background: #450a0a; color: #fca5a5; padding: 3px 8px; border-radius: 4px; border: 1px solid #b91c1c; font-size: 10px; font-weight: bold;}
        .badge-ban { background: #7f1d1d; color: #fecaca; padding: 3px 8px; border-radius: 4px; border: 1px solid #ef4444; font-size: 10px; font-weight: bold; }
        .badge-safe { background: #064e3b; color: #6ee7b7; padding: 3px 8px; border-radius: 4px; border: 1px solid #059669; font-size: 10px; font-weight: bold;}
        .mark-safe-btn { background: #1e3a8a; border: 1px solid #3b82f6; color: #bfdbfe; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .xai-tag { color: #a78bfa; font-weight: bold; background: rgba(139, 92, 246, 0.1); padding: 2px 5px; border-radius: 3px; }
        .anomaly-high { color: #facc15; font-weight: bold; }
    </style>
</head>
<body class="p-6 md:p-10">
    
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 border-b border-gray-800 pb-6 gap-6">
        <div class="flex items-center gap-4">
            <div class="w-14 h-14 bg-gradient-to-br from-blue-600 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            </div>
            <div>
                <h1 class="text-3xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400">SENTIO 360</h1>
                <p class="text-xs text-gray-400 font-bold tracking-widest uppercase">Master DS Analytics Console</p>
            </div>
        </div>
        
        <div class="flex gap-4 items-center">
            <div id="driftMonitor" class="bg-gray-900 px-6 py-3 rounded-xl glass border-l-4 border-l-green-500 text-center">
                <div class="text-gray-400 text-[10px] font-bold uppercase tracking-wider mb-1">Model Health (Drift)</div>
                <div id="driftStatus" class="text-green-500 font-black text-xl">NORMAL</div>
            </div>
            <div class="bg-gray-900 px-6 py-3 rounded-xl glass border-l-4 border-l-red-500 text-center">
                <div class="text-gray-400 text-[10px] font-bold uppercase tracking-wider mb-1">Active Bans</div>
                <div id="banIp" class="text-red-500 font-black text-2xl">0</div>
            </div>
            <button onclick="downloadPDF()" class="bg-gradient-to-r from-purple-700 to-blue-700 hover:from-purple-600 hover:to-blue-600 px-6 py-4 rounded-xl font-bold shadow-lg shadow-purple-500/30 text-sm flex items-center gap-2 transition">
                📄 PDF Audit Report
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="glass rounded-xl p-6 flex flex-col items-center">
            <h2 class="text-sm font-bold text-gray-400 mb-4 tracking-widest uppercase">Traffic Classes</h2>
            <div class="w-full max-w-[250px] aspect-square relative"><canvas id="trafficChart"></canvas></div>
        </div>
        <div class="glass rounded-xl p-6 md:col-span-2 flex flex-col">
            <h2 class="text-sm font-bold text-gray-400 mb-4 tracking-widest uppercase">Meta-Learning Fused Risk Timeline</h2>
            <div class="w-full h-[250px] relative"><canvas id="riskChart"></canvas></div>
        </div>
    </div>

    <div class="glass rounded-xl p-6 mb-10">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-bold text-gray-300 flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-red-500 animate-pulse"></span> LIVE INSPECTION LOGS & ANOMALY SCORES
            </h2>
        </div>
        
        <div class="log-row font-black text-gray-400 bg-gray-800/80 uppercase tracking-widest text-[9px] rounded-t-lg">
            <div>Time</div><div>IP</div><div>Status</div><div>Action</div><div>XAI Explanation</div><div>Anomaly Error</div><div>Latency</div><div>Feedback</div>
        </div>
        <div id="logTable" class="h-[400px] overflow-y-auto font-mono custom-scrollbar"></div>
    </div>

    <script>
        Chart.defaults.color = '#888';
        Chart.defaults.font.family = 'monospace';

        const trafficChart = new Chart(document.getElementById('trafficChart').getContext('2d'), {
            type: 'doughnut', data: { labels: ['Safe', 'Warnings', 'Bans'], datasets: [{ data: [1, 0, 0], backgroundColor: ['#059669', '#d97706', '#dc2626'], borderWidth: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#ccc', font: { size: 10 } } } }, cutout: '70%' }
        });

        const riskChart = new Chart(document.getElementById('riskChart').getContext('2d'), {
            type: 'line', data: { labels: [], datasets: [{ label: 'Fused Risk', data: [], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.2)', borderWidth: 2, fill: true, pointRadius: 2 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 1.1 } }, plugins: { legend: { display: false } } }
        });

        let currentLogs = []; 

        function formatXAI(text) {
            return text.replace(/\[XAI\]/g, '<span class="xai-tag">[XAI]</span>')
                       .replace(/\[BEH-XAI\]/g, '<span class="xai-tag text-blue-400">[BEH-XAI]</span>')
                       .replace(/\[NLP-XAI\]/g, '<span class="xai-tag text-green-400">[NLP-XAI]</span>')
                       .replace(/\[VIS-XAI\]/g, '<span class="xai-tag text-purple-400">[VIS-XAI]</span>')
                       .replace(/\[ZERO-DAY\]/g, '<span class="xai-tag text-red-500 bg-red-900/30">[ZERO-DAY]</span>');
        }

        async function fetchLogs() {
            try {
                const res = await fetch('/api/v1/dashboard_data');
                const data = await res.json();
                currentLogs = data.logs; 
                
                document.getElementById('banIp').innerText = data.blocked_ips.length;
                
                // DATA SCIENCE: Update Concept Drift UI
                const driftBox = document.getElementById('driftMonitor');
                const driftStatus = document.getElementById('driftStatus');
                if (data.concept_drift) {
                    driftBox.className = "bg-gray-900 px-6 py-3 rounded-xl glass border-l-4 border-l-yellow-500 text-center animate-pulse";
                    driftStatus.className = "text-yellow-500 font-black text-xl";
                    driftStatus.innerText = "DRIFT DETECTED! (Retrain needed)";
                }

                const table = document.getElementById('logTable');
                table.innerHTML = "";
                let safeCount = 0, warnCount = 0, banCount = 0;

                data.logs.forEach(log => {
                    if(log.action.includes('SAFE') || log.action === 'PASSED') safeCount++;
                    else if(log.action.includes('WARNING')) warnCount++;
                    else banCount++;

                    const statusClass = log.status === 'BLOCK' ? 'block-text' : 'allow-text';
                    let actionBadge = `<span class="badge-safe">${log.action}</span>`;
                    if (log.action.includes('BANNED')) actionBadge = `<span class="badge-ban">${log.action}</span>`;
                    else if (log.action.includes('WARNING')) actionBadge = `<span class="badge-warning">${log.action}</span>`;

                    let feedbackBtn = log.status === 'BLOCK' ? `<button onclick="markSafe('${log.ip}')" class="mark-safe-btn">✅ Safe</button>` : `-`;
                    let anomalyClass = log.anomaly_score > 5.0 ? 'anomaly-high' : 'text-gray-500';

                    table.innerHTML += `
                        <div class="log-row hover:bg-gray-800/60 transition-colors">
                            <div class="text-gray-400">${log.time}</div>
                            <div class="text-blue-300 font-bold">${log.ip}</div>
                            <div class="${statusClass}">${log.status}</div>
                            <div>${actionBadge}</div>
                            <div class="text-gray-300 text-xs">${formatXAI(log.details)}</div>
                            <div class="${anomalyClass}">${log.anomaly_score} Error</div>
                            <div class="text-yellow-400 font-bold">${log.latency}ms</div>
                            <div>${feedbackBtn}</div>
                        </div>`;
                });

                trafficChart.data.datasets[0].data = [safeCount, warnCount, banCount];
                trafficChart.update();

                const recentLogs = [...data.logs].reverse().slice(-15);
                riskChart.data.labels = recentLogs.map(l => l.time);
                riskChart.data.datasets[0].data = recentLogs.map(l => l.risk);
                riskChart.update();

            } catch (e) {}
        }
        setInterval(fetchLogs, 1000);

        async function markSafe(ip) {
            await fetch('/api/v1/mark_safe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ip: ip }) });
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(16);
            doc.text("SENTIO 360 - Data Science Audit Report", 14, 20);
            doc.setFontSize(10);
            doc.text(`Generated on: ${new Date().toLocaleString()}`, 14, 30);
            
            doc.autoTable({
                startY: 40,
                head: [['Time', 'IP', 'Status', 'Anomaly Error', 'AI Explanation']],
                body: currentLogs.map(log => [log.time, log.ip, log.status, log.anomaly_score, log.details]),
                styles: { fontSize: 8 }, headStyles: { fillColor: [139, 92, 246] }
            });
            doc.save('Sentio360_DS_Report.pdf');
        }
    </script>
</body>
</html>
